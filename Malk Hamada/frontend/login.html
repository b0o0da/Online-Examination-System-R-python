<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Login & Register - Online Exam System</title>

  <link rel="stylesheet" href="css/style.css">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

  <div class="container">
    <input type="checkbox" id="flip">

    <div class="cover">
      <div class="front">
        <img src="images/frontImg.jpg" alt="Online Exam">
        <div class="text">
          <span class="text-1">Welcome to your <br> Online Exam System</span>
          <span class="text-2">Login and start your exam</span>
        </div>
      </div>

      <div class="back">
        <img src="images/backImg.jpg" alt="Register">
        <div class="text">
          <span class="text-1">Create your account <br> and join us</span>
          <span class="text-2">Let's get started</span>
        </div>
      </div>
    </div>

    <div class="forms">
      <div class="form-content">

        <!-- Login Form -->
        <div class="login-form">
          <div class="title">Login</div>

          <form id="loginForm">
            <div class="input-boxes">

              <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="text" id="loginEmail" placeholder="Enter your username" required>
              </div>

              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
              </div>

              <div class="text">
                <a href="#">Forgot password?</a>
              </div>

              <div class="button input-box">
                <input type="submit" value="Login">
              </div>

              <div class="text sign-up-text">
                Don't have an account?
                <label for="flip">Signup now</label>
              </div>

            </div>
          </form>
        </div>

        <!-- Signup Form -->
        <div class="signup-form">
          <div class="title">Signup</div>

          <form id="registerForm">
            <div class="input-boxes">

              <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="username" placeholder="Enter your name" required>
              </div>

              <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Enter your email" required>
              </div>

              <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Enter your password" required>
              </div>

              <div class="input-box">
                <i class="fas fa-user-tag"></i>
                <select id="role" required>
                  <option value="student">Student</option>
                  <option value="admin">Admin</option>
                </select>
              </div>

              <div class="button input-box">
                <input type="submit" value="Signup">
              </div>

              <div class="text sign-up-text">
                Already have an account?
                <label for="flip">Login now</label>
              </div>

            </div>
          </form>
        </div>

      </div>

      <p id="message"></p>
    </div>
  </div>
  
<script>
const API_URL = "http://127.0.0.1:8000";

// Login
document.getElementById("loginForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const email = document.getElementById("loginEmail").value;
  const password = document.getElementById("loginPassword").value;

  const response = await fetch(`${API_URL}/auth/login`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
  username: email,
  password: password
})
 
 });
  const data = await response.json();

  if (response.ok) {
    localStorage.setItem("token", data.access_token || data.token);
    document.getElementById("message").innerText = "Login successful";
    window.location.href = "exams.html";
  } else {
    document.getElementById("message").innerText = data.detail || "Login failed";
  }
});

// Register
document.getElementById("registerForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const username = document.getElementById("username").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const role = document.getElementById("role").value;

  const response = await fetch(`${API_URL}/auth/register`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      username: username,
      email: email,
      password: password,
      role: role
    })
  });

  const data = await response.json();

  if (response.ok) {
    document.getElementById("message").innerText = "Account created successfully. Please login.";
    document.getElementById("flip").checked = false;
  } else {
    document.getElementById("message").innerText = data.detail || "Register failed";
  }
});
</script>
</body>
</html>
